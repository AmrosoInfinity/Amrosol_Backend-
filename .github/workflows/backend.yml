name: Backend Token Generator

on:
  workflow_dispatch:   # bisa dijalankan manual dari tab Actions
  push:                # otomatis jalan setiap kali ada commit ke backend

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo backend
      - name: Checkout backend repo
        uses: actions/checkout@v3

      # 2. Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Jalankan script backend (generate token.json)
      - name: Run backend script
        run: python app.py

      # 5. Checkout repo frontend (Amrosol-Website)
      - name: Checkout frontend repo
        uses: actions/checkout@v3
        with:
          repository: AmrosoInfinity/Amrosol-Website
          token: ${{ secrets.GITHUB_TOKEN }}
          path: Amrosol_Web

      # 6. Copy token.json hasil backend ke repo frontend
      - name: Copy token.json ke frontend
        run: cp token.json Amrosol_Web/data/token.json

      # 7. Commit & push perubahan ke repo frontend
      - name: Commit & push ke frontend
        run: |
          cd Amrosol_Web
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/token.json
          git commit -m "Update token.json dari backend"
          git push
