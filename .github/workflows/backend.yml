name: Backend Token Workflow

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate-token:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout backend repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run backend app
      run: python app.py

    - name: Checkout frontend repo
      uses: actions/checkout@v4
      with:
        repository: AmrosoInfinity/Amrosol-Website
        path: frontend
        token: ${{ secrets.FRONTEND_TOKEN }}

    - name: Copy token.json to frontend
      run: cp token.json frontend/data/token.json

    - name: Commit & push to frontend
      run: |
        cd frontend
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/token.json
        git commit -m "Update token.json from backend workflow"
        git push
